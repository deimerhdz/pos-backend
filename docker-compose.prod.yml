services:
  postgres:
    image: postgres:16
    container_name: pos
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # sin 'ports': solo accesible en la red interna de compose

  redis:
    image: redis:7-alpine
    container_name: pos-redis
    restart: unless-stopped
    # sin 'ports': solo accesible en la red interna de compose

  api:
    image: ghcr.io/deimerhdz/pos-backend:${IMAGE_TAG:-latest}
    container_name: pos-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:8000:8000"   # solo local; Nginx hace el proxy público

  worker:
    image: ghcr.io/deimerhdz/pos-backend:${IMAGE_TAG:-latest}
    container_name: pos-worker
    restart: unless-stopped
    entrypoint: ["celery", "-A", "app.celery_task:c_app", "worker", "--loglevel=info"]
    env_file: .env
    environment:
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - redis

volumes:
  postgres_data:
